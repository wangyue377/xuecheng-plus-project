#微服务配置
spring:
  application:
    name: media-api
  cloud:
    nacos:
      server-addr: 192.168.101.65:8848
      discovery:
        namespace: dev377
        group: xuecheng-plus-project
      config:
        namespace: dev377
        group: xuecheng-plus-project
        file-extension: yaml
        refresh-enabled: true
        extension-configs:
          - data-id: media-service-${spring.profiles.active}.yaml
            group: xuecheng-plus-project
            refresh: true
        shared-configs:
          - data-id: swagger-${spring.profiles.active}.yaml
            group: xuecheng-plus-common
            refresh: true
          - data-id: logging-${spring.profiles.active}.yaml
            group: xuecheng-plus-common
            refresh: true
  # 新增：文件上传大小限制配置（Spring Boot 2.x/3.x 版本）
  servlet:
    multipart:
      max-file-size: 50MB        # 单个文件最大上传大小（按需调整，比如100MB）
      max-request-size: 50MB     # 单次请求所有文件总大小限制（需≥单个文件大小）
  profiles:
    active: dev

